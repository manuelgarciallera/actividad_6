<section class="container mt-4">
  <div class="card shadow">
    <div class="card-body">
      <div class="row">
        <div class="col-12 col-md-4 text-center">
          <figure>
            <img class="imagen" [src]="usuario()?.image" [alt]="usuario()?.first_name">
          </figure>
        </div>
        <div class="col-12 col-md-8">
          <h3>{{usuario()?.first_name}} {{usuario()?.last_name}}</h3>
          <hr>
          <p><strong>Username:</strong> {{usuario()?.username}}</p>
          <p><strong>Email:</strong> {{usuario()?.email}}</p>
          <div class="mt-3">
            <button class="btn btn-danger me-2" [routerLink]="['/home']">Volver a listado</button>
            <button class="btn btn-warning me-2" [routerLink]="['/updateuser', usuario()?._id]">Actualizar</button>
            <button class="btn btn-danger" (click)="deleteUsuario()">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
